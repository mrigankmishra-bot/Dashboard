<!DOCTYPE html>
<html>
<head>
  <title>SOV Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; padding: 20px;">

<script>
// 🔐 PASSWORD
const correctPassword = "PRSSOW";
const entered = prompt("Enter password to view dashboard:");

if (entered !== correctPassword) {
  document.body.innerHTML = "<h2>Access Denied</h2>";
} else {

  document.body.innerHTML = `
    <h2>SOV Dashboard</h2>
    <canvas id="chart"></canvas>
  `;

  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSXkEgJLWXGous-880Mu0iy5egeoJ6nmFp2QS-aPU0zMelxTvij8lXQwld85kGQA0aJzbmJ-NOGsa1Q/pub?gid=0&single=true&output=csv")
    .then(res => res.text())
    .then(csv => {

      const rows = csv.split("\n").slice(1);
      const data = [];

      rows.forEach(r => {
        const cols = r.split(",");

        if (cols.length > 15) {
          const brand = cols[0];

          // 🧠 CLEAN SOV VALUE
          let raw = cols[15];

          if (raw) {
            raw = raw.replace(/%/g, "")      // remove %
                     .replace(/,/g, "")      // remove commas
                     .trim();

            const sov = parseFloat(raw);

            if (!isNaN(sov) && brand) {
              data.push({ brand, sov });
            }
          }
        }
      });

      // 🔥 SORT DESCENDING
      data.sort((a, b) => b.sov - a.sov);

      // 🔥 TAKE TOP 10
      const topData = data.slice(0, 10);

      const labels = topData.map(d => d.brand);
      const values = topData.map(d => d.sov);

      new Chart(document.getElementById("chart"), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'SOV',
            data: values
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          }
        }
      });

    });
}
</script>

</body>
</html>
