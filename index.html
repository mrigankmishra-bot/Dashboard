<!DOCTYPE html>
<html>
<head>
  <title>JioHotstar Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; font-family: Arial; background:#f5f7fb; }
    .header { background:#1f3b6d; color:white; padding:16px 24px; font-size:22px; }
    .container { padding:20px; }

    .filters, .cards { display:flex; gap:15px; margin-bottom:20px; }
    select { padding:8px; border-radius:6px; }

    .card {
      flex:1; background:white; padding:15px;
      border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }
    .card h4 { margin:0; color:#777; font-size:12px; }
    .card p { margin:5px 0 0; font-size:22px; font-weight:bold; }

    .chart-box {
      background:white; padding:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<script>
const PASSWORD = "PRSSOW";
if (prompt("Enter password") !== PASSWORD) {
  document.body.innerHTML = "<h2 style='padding:20px'>Access Denied</h2>";
} else {

document.body.innerHTML = `
<div class="header">JIOHOTSTAR Sales Dashboard</div>

<div class="container">

<div class="filters">
  <select id="leader"></select>
  <select id="rh"></select>
  <select id="ad"></select>
  <select id="kam"></select>
</div>

<div class="cards">
  <div class="card"><h4>YT SALES</h4><p id="yt"></p></div>
  <div class="card"><h4>TV SALES</h4><p id="tv"></p></div>
  <div class="card"><h4>JHS SALES</h4><p id="rev"></p></div>
  <div class="card"><h4>BLENDED SOW</h4><p id="sow"></p></div>
</div>

<div class="chart-box">
  <h3>SOW % by Client</h3>
  <canvas id="chart"></canvas>
</div>

</div>
`;

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXkEgJLWXGous-880Mu0iy5egeoJ6nmFp2QS-aPU0zMelxTvij8lXQwld85kGQA0aJzbmJ-NOGsa1Q/pub?gid=0&single=true&output=csv";

let rawData = [];

fetch(url)
.then(r => r.text())
.then(csv => {

  const rows = csv.split("\n").slice(1);

  rows.forEach(r => {
    const c = r.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    if (!c || c.length < 16) return;

    rawData.push({
      adv: c[0],
      leader: c[4],
      rh: c[5],
      ad: c[6],
      kam: c[7],
      yt: parseFloat(c[10]?.replace(/,/g,"")) || 0,
      tv: parseFloat(c[11]?.replace(/,/g,"")) || 0,
      rev: parseFloat(c[13]?.replace(/,/g,"")) || 0,
      adex: parseFloat(c[14]?.replace(/,/g,"")) || 0
    });
  });

  initFilters();
  update();
});

function initFilters() {
  populate("leader", "leader");
  populate("rh", "rh");
  populate("ad", "ad");
  populate("kam", "kam");

  document.querySelectorAll("select").forEach(s => {
    s.onchange = update;
  });
}

function populate(id, key) {
  const sel = document.getElementById(id);
  const vals = [...new Set(rawData.map(d => d[key]).filter(Boolean))];

  sel.innerHTML = "<option value='all'>All</option>" +
    vals.map(v => `<option>${v}</option>`).join("");
}

function update() {

  const f = {
    leader: leader.value,
    rh: rh.value,
    ad: ad.value,
    kam: kam.value
  };

  const data = rawData.filter(d =>
    (f.leader==="all"||d.leader===f.leader) &&
    (f.rh==="all"||d.rh===f.rh) &&
    (f.ad==="all"||d.ad===f.ad) &&
    (f.kam==="all"||d.kam===f.kam)
  );

  let yt=0, tv=0, rev=0, adex=0;

  data.forEach(d => {
    yt+=d.yt; tv+=d.tv; rev+=d.rev; adex+=d.adex;
  });

  document.getElementById("yt").innerText = yt.toFixed(1)+" Cr";
  document.getElementById("tv").innerText = tv.toFixed(1)+" Cr";
  document.getElementById("rev").innerText = rev.toFixed(1)+" Cr";
  document.getElementById("sow").innerText =
    (adex ? (rev/adex*100).toFixed(1) : 0) + "%";

  // group by client
  const map = {};
  data.forEach(d => {
    if (!map[d.adv]) map[d.adv] = {rev:0, adex:0};
    map[d.adv].rev += d.rev;
    map[d.adv].adex += d.adex;
  });

  const arr = Object.entries(map).map(([k,v]) => ({
    name:k,
    sow: v.adex ? v.rev/v.adex*100 : 0
  }));

  arr.sort((a,b)=>b.sow-a.sow);
  const top = arr.slice(0,10);

  if (window.chart) window.chart.destroy();

  window.chart = new Chart(document.getElementById("chart"), {
    type:"bar",
    data:{
      labels: top.map(d=>d.name),
      datasets:[{ data: top.map(d=>d.sow) }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true}}
    }
  });
}

}
</script>

</body>
</html>
